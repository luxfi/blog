baseURL = "https://blog.lux.network/"
languageCode = "en-us"
title = "Lux Network Blog"
theme = "ananke"

[params]
  author = "Zach Kelling"
  description = "Official blog of Lux Network - Multi-consensus blockchain with post-quantum security"
  site_logo = "/images/lux-logo.png"
  background_color_class = "bg-black"
  recent_posts_number = 10

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 2

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
